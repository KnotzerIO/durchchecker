services:
  app:
    build: .
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-durchchecker}:${POSTGRES_PASSWORD:-durchchecker}@db:5432/${POSTGRES_DB:-durchchecker}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-durchchecker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-durchchecker}
      POSTGRES_DB: ${POSTGRES_DB:-durchchecker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-durchchecker}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
